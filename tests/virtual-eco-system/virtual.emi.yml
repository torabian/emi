name: virtual
description: Virtual eco system of actions, dtos, which covers entire 
  features of the compiler for different languages.

vsqls:
  - name: insertUser
    description: Inserts user into database
    captures:
      - template: userentity
    
    query: |

      BEGIN;

      {{ $u := sqlFieldsExcept . "tags" -}}
      INSERT INTO users ({{ $u.Columns }})
      VALUES ({{ $u.Values }});

      {{ $a := sqlFields .Address -}}
      INSERT INTO addresses ({{ $a.Columns }})
      VALUES ({{ $a.Values }});

      {{- if .Tags }}
      INSERT INTO user_tags (user_id, key, value) VALUES
      {{- range $i, $t := .Tags }}{{ if $i }},{{ end }}
        ({{ sql $.Id }}, {{ sql $t.Key }}, {{ sql $t.Value }})
      {{- end }};
      {{- end }}

      COMMIT;


templates:
  dtos:
  - name: userentity
    fields:
      - name: name
        type: string
      - name: email
        type: string?
      - name: age
        type: int
      - name: preferences
        type: object
        fields:
          - name: theme
            type: string
          - name: locale
            type: string
      - name: tags
        type: array
        fields:
          - name: key
            type: string
          - name: value
            type: string

      - name: address
        type: object
        description: Insert payload for the addresses table. The `location` field is
          a complex type (GeoPoint) defined in the consumer's package; emi just
          references it by name so the renderer's SQLValuer hook can take over.
        fields:
          - name: id
            type: int64
          - name: userId
            type: int64
          - name: street
            type: string
          - name: city
            type: string
          - name: postcode
            type: string?
dtos:
  - name: giant
    fields:
      - name: firstName
        type: string
      - name: firstNameNullable
        type: string?
      - name: array
        type: array
        fields:
          - name: subItem1
            type: int
      - name: arrayNullable
        type: array?
        fields:
          - name: subItemNullable1
            type: int?
      - name: booleanField
        type: bool
      - name: booleanFieldNullable
        type: bool?
      
      - name: collectionItems
        type: collection
        target: GiantDto
      - name: collectionItemsNullable
        type: collection?
        target: GiantDto
      # - name: dateObject
      #   type: complex
      #   complex: Date
      - name: singleRefNullable
        type: one?
        target: GiantDto
      - name: enumeration
        type: enum
        of:
          - k: Key3
          - k: Key4
      - name: enumerationNullable
        type: enum?
        of:
          - k: Key1
          - k: Key2
      - name: floatingPoint32
        type: float32
      - name: floatingPoint32Nullable
        type: float32?
      - name: floatingPoint64
        type: float64
      - name: floatingPoint64Nullable
        type: float64?
      - name: integerValue
        type: int
      - name: integer32ValueNullable
        type: int32?
      - name: integer32Value
        type: int32
      - name: integer64ValueNullable
        type: int64?
      - name: integer64Value
        type: int64
      - name: mapValue
        type: map
      - name: mapValueNullable
        type: map?
      - name: sliceValue
        type: slice
        primitive: string
      - name: sliceValueNullable
        primitive: string
        type: slice?
      - name: objectValue
        type: object
        fields:
          - name: innerObject
            type: object?
            fields:
              - name: innerObjText
                type: string


actions:
  - name: modifyGiantDto
    method: post
    url: /modify/dto
    in:
      dto: GiantDto
    out:
      dto: GiantDto

  - name: getAsGiants
    method: get
    url: /get/giant/:id
    out:
      dto: GiantDto
  
  - name: patchGiant
    method: patch
    url: /get/giant/:id
    in:
      dto: GiantDto
  